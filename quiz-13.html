<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSB Schnitzeljagd 2.0 - Quest 13</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="background-effects">
        <canvas id="campfire"></canvas>
    </div>

    <div id="theme-controls" class="theme-controls-panel">
        <span id="btn-dark">Dark</span> / <span id="btn-light">Light</span>
    </div>

    <main>
        <div class="container quiz-container animate-enter">
            <h1 class="title-main">Quest 13</h1>

            <div class="glass-panel card">
                <!-- Quest Giver: Thrall -->
                <div class="quest-giver-wrapper">
                    <div class="quest-bubble">
                        <div class="quest-speaker-name">Thrall</div>
                        <h2>Reise an diesen mystischen Ort und bringe mir ein Bild als Beweis! Vergiss nicht, deinen
                            Charakter im Bild zu zeigen.</h2>
                    </div>
                </div>

                <div class="target-location-box q13-location-box">
                    <h3 class="text-wow-blue q13-location-label">Dein Reiseziel:</h3>
                    <p id="location-display" class="q13-location-value">Lade Ort...</p>
                </div>

                <div class="input-container mt-md">
                    <label class="form-label">Zum Beweis: Link zum Imgur-Screenshot</label>
                    <input type="url" id="quiz-input" class="form-input" placeholder="https://imgur.com..."
                        autocomplete="off">
                </div>

                <div class="action-row mt-md">
                    <button id="confirm-btn" class="btn-primary btn-flex-grow" onclick="checkAnswer()">
                        <span>Beweis Einreichen!</span>
                    </button>
                    <button id="skip-btn" class="btn-secondary" onclick="skipQuiz('quiz13')">
                        <span>Ich bin OOM! (Skip)</span>
                    </button>
                </div>
                <p id="error-msg" class="error-message">
                </p>
            </div>
        </div>
    </main>

    <!-- Background Character -->
    <img src="images/Thrall.png" class="quest-portrait animate-enter" alt="Thrall">

    <!-- Static HUD Skeleton -->
    <div id="game-hud" class="glass-panel hud-static">
        <div class="hud-row header">
            <span class="hud-label">Held</span>
            <span class="hud-value name">...</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-row-spread">
            <span class="hud-accent hud-accent-text">Stufe
                ...</span>
            <span class="hud-subtext hud-subtext-small">...%</span>
        </div>
        <div class="xp-container hud-xp-container-tight">
            <div class="xp-bar">
                <div class="xp-fill"></div>
                <div class="xp-text">...</div>
            </div>
        </div>
        <div class="hud-total-row">
            <span class="hud-muted hud-text-muted">Total: ...</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-stats-grid">
            <div class="stat-item completed"><span class="stat-label">Erledigt</span><span class="stat-val">...</span>
            </div>
            <div class="stat-item skipped"><span class="stat-label">Skipped</span><span class="stat-val">...</span>
            </div>
            <div class="stat-item open"><span class="stat-label">Offen</span><span class="stat-val">...</span></div>
        </div>
    </div>

    <script src="campfire.js"></script>
    <script src="stars.js"></script>
    <script src="settings.js"></script>
    <script src="gamestate.js"></script>
    <script src="sidebar.js"></script>
    <script src="sounds.js"></script>
    <script src="toast.js"></script>
    <script src="gamehud.js"></script>
    <script src="script.js"></script>
    <script>
        const QUIZ_ID = 'quiz13';
        let startTime = Date.now();
        let currentState = null;

        const LOCATIONS = [
            "Waldgebiet: Im Schatten der riesigen Bäume im Jadewald (Pandaria).",
            "Wüste: Bei den riesigen Knochen-Skeletten in der Wüste von Vol'dun (BfA).",
            "Wasserfall: Vor dem gigantischen Doppel-Wasserfall im Heulenden Fjord (WotLK).",
            "Mystisch: Sitzend auf (oder unter) einem gigantischen leuchtenden Pilz in den Zangarmarschen (TBC).",
            "Episch: Auf der Spitze von Sargeras' gewaltigem Schwert in Silithus (Legion).",
            "Aussicht: Ganz oben auf der Brüstung des Wyrmruhtempels in der Drachenöde (WotLK).",
            "Unter Wasser: In der tiefen, überfluteten Schlucht von Tausend Nadeln (Cataclysm).",
            "Düster: Direkt vor dem magisch verschlossenen Portal von Karazhan (Classic/TBC).",
            "Kosmisch: Auf der Plattform 'Sitz der Aspekte' in Valdrakken mit weitem Blick (Dragonflight).",
            "Unterirdisch: In der leuchtend schimmernden Grotte von Heilsturz (Hallowfall) unter dem Kristall (TWW)."
        ];

        // Init State Check
        try {
            currentState = GameState.decode();
            if (!currentState) throw new Error("No state");
        } catch (e) {
            console.error(e);
            alert("Fehler: Spielstand nicht gefunden. Zurück zum Start.");
            window.location.href = window.appendThemeParam('index.html');
        }

        let assignedLocation = "";

        document.addEventListener("DOMContentLoaded", () => {
            // Check if player already rolled a location for Q13 in local storage to prevent rerolling
            const storageKey = `schnitzeljagd_${QUIZ_ID}_location`;
            const savedLocation = localStorage.getItem(storageKey);

            if (savedLocation && LOCATIONS.includes(savedLocation)) {
                assignedLocation = savedLocation;
            } else {
                // Pick a random location
                const randomIndex = Math.floor(Math.random() * LOCATIONS.length);
                assignedLocation = LOCATIONS[randomIndex];
                localStorage.setItem(storageKey, assignedLocation);
            }

            document.getElementById('location-display').textContent = assignedLocation;
        });

        function checkAnswer() {
            const val = document.getElementById('quiz-input').value.trim();

            if (!val) {
                showErrorToast("Bitte gib einen Link ein!");
                return;
            }
            if (!val.toLowerCase().includes("imgur.com")) {
                showErrorToast("Das sieht nicht nach einem gültigen Imgur-Link aus.");
                document.getElementById('quiz-input').classList.add('error-shake');
                setTimeout(() => document.getElementById('quiz-input').classList.remove('error-shake'), 600);
                return;
            }

            const timeTaken = (Date.now() - startTime) / 1000;

            // Save the imgur link AND the rolled location so the admin can cross-reference
            const submissionData = `Location: ${assignedLocation} | Link: ${val}`;

            // Update State with extra argument string
            const nextStateEncoded = GameState.update(currentState, QUIZ_ID, timeTaken, submissionData);

            // Get Next URL
            let nextUrl = GameState.getNextQuizUrl(currentState, QUIZ_ID);
            if (window.appendThemeParam) nextUrl = window.appendThemeParam(nextUrl);

            window.location.href = nextUrl;
        }
    </script>
</body>

</html>
