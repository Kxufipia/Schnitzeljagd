<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSB Schnitzeljagd 2.0 - Quest 8</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="background-effects">
        <canvas id="campfire"></canvas>
    </div>

    <div id="theme-controls" class="theme-controls-panel">
        <span id="btn-dark">Dark</span> / <span id="btn-light">Light</span>
    </div>

    <main>
        <div class="container quiz-container animate-enter">
            <h1 class="title-main">Quest 8: Die magische Formel</h1>

            <div class="glass-panel card">
                <!-- Quest Giver: Jaina -->
                <div class="quest-giver-wrapper">
                    <div class="quest-bubble">
                        <div class="quest-speaker-name">Jaina</div>
                        <h2>Entschlüssele den Preis!</h2>
                        <p class="quest-instruction">Ausgangswert (Quest 7 Preis): <strong class="text-wow-gold"
                                id="display-price">0</strong> Kupfer.</p>
                        <p class="quest-instruction" id="display-instruction"
                            style="font-weight: bold; color: var(--text-main);">
                            [Platzhalter für die Rechenaufgabe]
                        </p>
                    </div>
                </div>

                <div class="input-container mt-md" style="text-align: center;">
                    <input type="text" id="answer-input" class="imgur-input" placeholder="Lösung eingeben..."
                        style="text-align: center; max-width: 300px; margin: 0 auto; display: block;" />
                </div>

                <div class="action-row mt-md">
                    <button id="confirm-btn" class="btn-primary btn-flex-grow" onclick="checkAnswer()">
                        <span>Bestätigen</span>
                    </button>
                    <button id="skip-btn" class="btn-secondary" onclick="skipQuiz('quiz8')">
                        <span>Ich bin OOM! (Skip)</span>
                    </button>
                </div>
                <p id="error-msg" class="error-message">
                </p>
            </div>
        </div>
    </main>

    <!-- Background Character -->
    <img src="images/Jaina.png" class="quest-portrait animate-enter" alt="Jaina">

    <!-- Static HUD Skeleton -->
    <div id="game-hud" class="glass-panel hud-static">
        <div class="hud-row header">
            <span class="hud-label">Held</span>
            <span class="hud-value name">...</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-row-spread">
            <span class="hud-accent hud-accent-text">Stufe
                ...</span>
            <span class="hud-subtext hud-subtext-small">...%</span>
        </div>
        <div class="xp-container hud-xp-container-tight">
            <div class="xp-bar">
                <div class="xp-fill"></div>
                <div class="xp-text">...</div>
            </div>
        </div>
        <div class="hud-total-row">
            <span class="hud-muted hud-text-muted">Total: ...</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-stats-grid">
            <div class="stat-item completed"><span class="stat-label">Erledigt</span><span class="stat-val">...</span>
            </div>
            <div class="stat-item skipped"><span class="stat-label">Skipped</span><span class="stat-val">...</span>
            </div>
            <div class="stat-item open"><span class="stat-label">Offen</span><span class="stat-val">...</span></div>
        </div>
    </div>

    <script src="campfire.js"></script>
    <script src="stars.js"></script>
    <script src="settings.js"></script>
    <script src="gamestate.js"></script>
    <script src="sidebar.js"></script>
    <script src="sounds.js"></script>
    <script src="toast.js"></script>
    <script src="gamehud.js"></script>
    <script src="script.js"></script>
    <script>
        const QUIZ_ID = 'quiz8';
        let startTime = Date.now();
        let currentState = null;

        // WoW Trivia Math formulas based on actual copper price in the game and their target max levels.
        const calcData = {
            "Classic": { instruction: "Teile den Kupfer-Preis durch 100. Addiere dann das maximale Charakterlevel (Max-Level) zu Zeiten von Classic WoW.", answer: ["180"] },
            "Burning Crusade": { instruction: "Teile den Kupfer-Preis durch 100.000. Addiere dann das Max-Level der Erweiterung The Burning Crusade.", answer: ["190"] },
            "Wrath of the Lich King": { instruction: "Teile den Kupfer-Preis durch 1.000.000. Addiere dann das Max-Level der Erweiterung Wrath of the Lich King.", answer: ["280"] },
            "Cataclysm": { instruction: "Teile den Kupfer-Preis durch 100. Addiere dann das Max-Level der Erweiterung Cataclysm.", answer: ["185"] },
            "Mists of Pandaria": { instruction: "Teile den Kupfer-Preis durch 10.000.000. Addiere dann das Max-Level der Erweiterung Mists of Pandaria.", answer: ["210"] },
            "Warlords of Draenor": { instruction: "Teile den Kupfer-Preis durch 10.000. Addiere dann das Max-Level der Erweiterung Warlords of Draenor.", answer: ["200"] },
            "Legion": { instruction: "Teile den Kupfer-Preis durch 10.000.000. Addiere dann das Max-Level der Erweiterung Legion.", answer: ["360"] },
            "Battle for Azeroth": { instruction: "Teile den Kupfer-Preis durch 100.000.000. Addiere dann das Max-Level der Erweiterung Battle for Azeroth.", answer: ["620"] },
            "Shadowlands": { instruction: "Teile den Kupfer-Preis durch 100. Addiere dann das durch den 'Level Squish' resultierende neue Max-Level von Shadowlands.", answer: ["110"] },
            "Dragonflight": { instruction: "Teile den Kupfer-Preis durch 100. Addiere dann das Max-Level der Erweiterung Dragonflight.", answer: ["270"] },
            "The War Within": { instruction: "Teile den Kupfer-Preis durch 100. Addiere dann das derzeitige Max-Level von The War Within.", answer: ["580"] }
        };

        let currentExpansion = "Classic"; // Fallback
        let currentPrice = 0;
        let currentPuzzle = calcData["Classic"];

        // Init State Check
        try {
            currentState = GameState.decode();
            if (!currentState) throw new Error("No state");

            // Extract the expansion & price from Quiz 7 (ExpansionName|Price)
            if (currentState.scores && currentState.scores['quiz7'] && currentState.scores['quiz7'].extra) {
                const q7Extra = currentState.scores['quiz7'].extra;
                const parts = q7Extra.split('|');
                if (parts.length > 1 && calcData[parts[0]]) {
                    currentExpansion = parts[0];
                    currentPrice = parseInt(parts[1], 10) || 0;
                }
            }

            currentPuzzle = calcData[currentExpansion];

            // Populate UI
            document.getElementById('display-price').innerText = currentPrice;
            document.getElementById('display-instruction').innerText = currentPuzzle.instruction;

        } catch (e) {
            console.error(e);
            alert("Fehler: Spielstand nicht gefunden. Zurück zum Start.");
            window.location.href = window.appendThemeParam('index.html');
        }

        function checkAnswer() {
            const inputVal = document.getElementById('answer-input').value.trim().toLowerCase();
            const errorMsg = document.getElementById('error-msg');

            if (!inputVal) {
                showErrorToast("Bitte gib eine Lösung ein.");
                errorMsg.textContent = "Das Feld darf nicht leer sein.";
                return;
            }

            // Check against array of valid answers (lowercase)
            const validAnswers = currentPuzzle.answer.map(a => a.toLowerCase());
            const isCorrect = validAnswers.some(ans => inputVal.includes(ans));

            if (isCorrect) {
                errorMsg.textContent = "";
                const timeTaken = (Date.now() - startTime) / 1000;

                const nextStateEncoded = GameState.update(currentState, QUIZ_ID, timeTaken);

                let nextUrl = GameState.getNextQuizUrl(currentState, QUIZ_ID);
                if (window.appendThemeParam) nextUrl = window.appendThemeParam(nextUrl);

                window.location.href = nextUrl;
            } else {
                showErrorToast("Das ist leider nicht die richtige Antwort.");
                errorMsg.textContent = "Falsche Antwort. Überprüfe deine Rechnung.";
            }
        }
    </script>
</body>

</html>
