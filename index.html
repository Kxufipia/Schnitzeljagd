<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSB Schnitzeljagd 2.0</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-effects">
        <canvas id="campfire"></canvas>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Theme Controls -->
    <!-- Styles moved to style.css -->
    <div id="theme-controls" class="glass-panel">
        <a href="leaderboard.html" class="footer-link mr-sm">Bestenliste</a>
        <span id="btn-dark">Dark</span> / <span id="btn-light">Light</span>
    </div>

    <!-- Header Removed for Starry Sky -->

    <main>
        <div class="container animate-enter">
            <!-- Hero Text Removed -->

            <!-- Login Form Section -->
            <div id="login-section" class="glass-panel card delay-100 animate-enter login-card">
                <div class="card-glow-bar"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Wähle dein Schicksal</label>
                        <input type="hidden" id="charClass" value="warrior">

                        <!-- New Class Scroll Banner System -->
                        <div class="class-scroll-container">
                            <!-- Warriors -->
                            <div class="class-banner selected" data-value="warrior">
                                <img src="images/Warrior.png" alt="Warrior" class="class-banner-icon">
                                <div class="class-banner-name">Warrior</div>
                            </div>
                            <!-- Paladin -->
                            <div class="class-banner" data-value="paladin">
                                <img src="images/Paladin.png" alt="Paladin" class="class-banner-icon">
                                <div class="class-banner-name">Paladin</div>
                            </div>
                            <!-- Hunter -->
                            <div class="class-banner" data-value="hunter">
                                <img src="images/Hunter.png" alt="Hunter" class="class-banner-icon">
                                <div class="class-banner-name">Hunter</div>
                            </div>
                            <!-- Rogue -->
                            <div class="class-banner" data-value="rogue">
                                <img src="images/Rogue.png" alt="Rogue" class="class-banner-icon">
                                <div class="class-banner-name">Rogue</div>
                            </div>
                            <!-- Priest -->
                            <div class="class-banner" data-value="priest">
                                <img src="images/Priest.png" alt="Priest" class="class-banner-icon">
                                <div class="class-banner-name">Priest</div>
                            </div>
                            <!-- DK -->
                            <div class="class-banner" data-value="deathknight">
                                <img src="images/DeathKnight.png" alt="DK" class="class-banner-icon">
                                <div class="class-banner-name">Death Knight</div>
                            </div>
                            <!-- Shaman -->
                            <div class="class-banner" data-value="shaman">
                                <img src="images/Shaman.png" alt="Shaman" class="class-banner-icon">
                                <div class="class-banner-name">Shaman</div>
                            </div>
                            <!-- Mage -->
                            <div class="class-banner" data-value="mage">
                                <img src="images/Mage.png" alt="Mage" class="class-banner-icon">
                                <div class="class-banner-name">Mage</div>
                            </div>
                            <!-- Warlock -->
                            <div class="class-banner" data-value="warlock">
                                <img src="images/Warlock.png" alt="Warlock" class="class-banner-icon">
                                <div class="class-banner-name">Warlock</div>
                            </div>
                            <!-- Monk -->
                            <div class="class-banner" data-value="monk">
                                <img src="images/Monk.png" alt="Monk" class="class-banner-icon">
                                <div class="class-banner-name">Monk</div>
                            </div>
                            <!-- Druid -->
                            <div class="class-banner" data-value="druid">
                                <img src="images/Druid.png" alt="Druid" class="class-banner-icon">
                                <div class="class-banner-name">Druid</div>
                            </div>
                            <!-- DH -->
                            <div class="class-banner" data-value="demonhunter">
                                <img src="images/DemonHunter.png" alt="DH" class="class-banner-icon">
                                <div class="class-banner-name">Demon Hunter</div>
                            </div>
                            <!-- Evoker -->
                            <div class="class-banner" data-value="evoker">
                                <img src="images/Evoker.png" alt="Evoker" class="class-banner-icon">
                                <div class="class-banner-name">Evoker</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group mt-md">
                        <label for="charName">Charakter Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="charName" class="wow-input" placeholder="Name deines Helden" required
                                autocomplete="off">
                            <div class="input-glow"></div>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>Abenteuer Beginnen</span>
                    </button>
                </form>
            </div>

            <!-- Maintenance Countdown Section (Hidden by default) -->
            <div id="maintenance-section" class="glass-panel card animate-enter maintenance-card">
                <h1 class="maintenance-title">DAS PORTAL IST NOCH GESCHLOSSEN</h1>
                <p class="maintenance-text">Die Jagd beginnt erst am <span class="maintenance-date">08.03.2026 um 20:05
                        Uhr</span>.</p>

                <div id="countdown-timer" class="countdown-wrapper">
                    <div><span id="d">00</span><br><span class="countdown-label">TAGE</span></div>
                    <div>:</div>
                    <div><span id="h">00</span><br><span class="countdown-label">STD</span></div>
                    <div>:</div>
                    <div><span id="m">00</span><br><span class="countdown-label">MIN</span></div>
                    <div>:</div>
                    <div><span id="s">00</span><br><span class="countdown-label">SEK</span></div>
                </div>
            </div>

            <!-- Greeting Section (Removed per request) -->
        </div>
    </main>

    <footer>
        <div class="mb-sm">Lok'tar Ogar!</div>
        <a href="leaderboard.html" class="footer-link">Bestenliste</a>
    </footer>

    <script src="campfire.js"></script>
    <script src="stars.js"></script>
    <!-- State Management -->
    <script src="gamestate.js"></script>
    <script src="sounds.js"></script>
    <script src="toast.js"></script>
    <script src="gamehud.js"></script>
    <script src="script.js"></script>
</body>

</html>
