<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSB Schnitzeljagd 2.0 - Quest 2</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="background-effects">
        <canvas id="campfire"></canvas>
    </div>

    <div id="theme-controls" class="glass-panel"
        style="position: fixed; top: 1rem; right: 1rem; z-index: 50; padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.9rem; display:flex; gap: 0.5rem; color: #ccc;">
        <span id="btn-dark" style="cursor: pointer;">Dark</span> / <span id="btn-light"
            style="cursor: pointer;">Light</span>
    </div>

    <main>
        <div class="container animate-enter" style="margin-left: 17vw; max-width: 45vw; margin-right: auto;">
            <h1 style="margin-bottom: 1.5rem;">Quest 2: Das Gedächtnis der Ahnen</h1>

            <div class="glass-panel card" style="text-align: center;">
                <p style="margin-bottom: 1rem; color: #ccc;">Finde alle Paare, um den Weg freizumachen.</p>

                <div id="memory-board"
                    style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; perspective: 1000px; margin-bottom: 1rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                    <!-- Cards injected by JS -->
                </div>

                <div id="victory-message" style="display: none; margin-top: 2rem;">
                    <h2 style="color: var(--wow-gold);">Das Wissen ist dein!</h2>
                    <button id="next-btn" class="btn-primary" onclick="finishQuiz()">
                        <span>Weiter zur nächsten Prüfung</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Preload Card Back -->
    <div style="display: none;">
        <!-- Using a default card back, maybe the Jaina image or a generic WOW logo if available, otherwise CSS styled -->
    </div>

    <!-- Background Character: Jaina (Even Quiz) -->
    <img src="images/Jaina.png" class="quest-portrait animate-enter" alt="Jaina">

    <!-- Static HUD Skeleton -->
    <div id="game-hud" class="glass-panel"
        style="z-index: 9999; view-transition-name: persistent-hud; transition: none;">
        <div class="hud-row header">
            <span class="hud-label">Held</span>
            <span class="hud-value name">...</span>
        </div>
        <div class="hud-divider"></div>
        <div style="margin-top: 1rem; display: flex; justify-content: space-between; align-items: baseline;">
            <span class="hud-accent" style="font-size: 0.9rem; font-weight: bold; text-transform: uppercase;">Stufe
                ...</span>
            <span class="hud-subtext" style="font-size: 0.75rem;">...%</span>
        </div>
        <div class="xp-container" style="margin-top: 0.25rem; margin-bottom: 0.25rem;">
            <div class="xp-bar">
                <div class="xp-fill" style="width: 0%"></div>
                <div class="xp-text">...</div>
            </div>
        </div>
        <div style="text-align: right; margin-bottom: 1rem;">
            <span class="hud-muted" style="font-size: 0.8rem;">Total: ...</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-stats-grid">
            <div class="stat-item completed"><span class="stat-label">Erledigt</span><span class="stat-val">...</span>
            </div>
            <div class="stat-item skipped"><span class="stat-label">Skipped</span><span class="stat-val">...</span>
            </div>
            <div class="stat-item open"><span class="stat-label">Offen</span><span class="stat-val">...</span></div>
        </div>
    </div>

    <style>
        .memory-card {
            background-color: transparent;
            width: 100%;
            aspect-ratio: 2/3;
            /* Standard card ratio */
            perspective: 1000px;
            cursor: pointer;
        }

        .memory-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .memory-card.flipped .memory-card-inner {
            transform: rotateY(180deg);
        }

        .memory-card.solved {
            visibility: hidden;
            pointer-events: none;
            transition: visibility 0s 0.5s;
            /* Wait for flip back if any */
        }

        /* Fade out animation for solved cards */
        .memory-card.dissolve .memory-card-inner {
            opacity: 0;
            transform: scale(1.5);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }

        .memory-card-front,
        .memory-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            border: 2px solid var(--wow-border);
        }

        .memory-card-front {
            background-color: #222;
            color: white;
            transform: rotateY(180deg);
            /* background-size: cover; removed */
            /* background-position: center; removed */
        }

        .memory-card-back {
            background: linear-gradient(135deg, #444 0%, #111 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            /* Placeholder pattern */
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 0px, rgba(255, 255, 255, 0.05) 10px, transparent 10px, transparent 20px);
        }

        .memory-card-back::after {
            content: "?";
            font-size: 2rem;
            color: var(--wow-gold);
            font-weight: bold;
        }
    </style>

    <script src="campfire.js"></script>
    <script src="stars.js"></script>
    <script src="settings.js"></script>
    <script src="gamestate.js"></script>
    <script src="sidebar.js"></script>
    <script src="sounds.js"></script>
    <script src="toast.js"></script>
    <script src="gamehud.js"></script>
    <script src="script.js"></script>
    <script>
        const QUIZ_ID = 'quiz2';
        let startTime = Date.now();
        let currentState = null;

        // Image List from user folder
        const IMAGES = [
            "Deathknight - Arthas.jpg",
            "Demonhunter - Illidan.jpg",
            "Druid - Malfurion.jpg",
            "Evoker - Emberthal.jpg",
            "Hunter - Sylvanas.jpg",
            "Mage - Khadgar.jpg",
            "Monk - Chen.jpg",
            "Paladin - Tirion.jpg",
            "Priest - Velen.jpg",
            "Rogue - Garona.jpg",
            "Shaman - Thrall.jpg",
            "Warlock - Guldan.jpg",
            "Warrior - Garrosh.jpg"
        ];

        // Settings
        const PAIRS_NEEDED = 6; // 12 cards total grid (4x3) or 8 pairs (4x4)? 
        // 4x4 = 16 cards = 8 pairs. 13 images available. Randomly select 8.

        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let pairsFound = 0;

        // Init State Check
        try {
            currentState = GameState.decode();
            if (!currentState) throw new Error("No state");
        } catch (e) {
            console.error(e);
            alert("Fehler: Spielstand nicht gefunden. Zurück zum Start.");
            window.location.href = window.appendThemeParam('index.html');
        }

        function initGame() {
            const board = document.getElementById('memory-board');

            // random selection of images
            let selectedImages = [...IMAGES].sort(() => 0.5 - Math.random()).slice(0, 8); // 8 pairs

            // duplicate
            let deck = [...selectedImages, ...selectedImages];

            // shuffle
            deck.sort(() => 0.5 - Math.random());

            // render
            deck.forEach(img => {
                const card = document.createElement('div');
                card.classList.add('memory-card');
                card.dataset.name = img;

                const inner = document.createElement('div');
                inner.classList.add('memory-card-inner');

                const front = document.createElement('div');
                front.classList.add('memory-card-front');

                // Use IMG tag for better control and error handling
                const imgResult = document.createElement('img');
                // Manually encode only spaces to be safe, or use encodeURI if path allows
                // encodeURIComponent encodes / which we don't want if full path.
                // Here we only have filename. 
                const encodedImg = encodeURIComponent(img).replace(/'/g, "%27");
                imgResult.src = `images/Memory/${encodedImg}`;
                imgResult.style.width = '100%';
                imgResult.style.height = '100%';
                imgResult.style.objectFit = 'cover';
                imgResult.style.borderRadius = '8px';

                // Debugging: If error, show red background
                imgResult.onerror = function () {
                    this.parentElement.style.backgroundColor = 'red';
                    console.error("Failed to load image:", this.src);
                };

                front.appendChild(imgResult);

                const back = document.createElement('div');
                back.classList.add('memory-card-back');

                inner.appendChild(front);
                inner.appendChild(back);
                card.appendChild(inner);

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.name === secondCard.dataset.name;

            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            lockBoard = true;
            // Delay for visual effect
            setTimeout(() => {
                firstCard.classList.add('dissolve');
                secondCard.classList.add('dissolve');

                // After dissolve anim, hide them
                setTimeout(() => {
                    firstCard.style.visibility = 'hidden';
                    secondCard.style.visibility = 'hidden';
                    resetBoard();

                    pairsFound++;
                    if (pairsFound === 8) {
                        gameWon();
                    }
                }, 500);
            }, 1000);
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1500);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function gameWon() {
            document.getElementById('victory-message').style.display = 'block';
            if (window.SoundManager) SoundManager.playLevelUp(); // Assuming this exists or generic success
        }

        function finishQuiz() {
            const timeTaken = (Date.now() - startTime) / 1000;
            // Update State
            const nextStateEncoded = GameState.update(currentState, QUIZ_ID, timeTaken);
            // Get Next URL (likely quiz-3.html)
            let nextUrl = GameState.getNextQuizUrl(currentState, QUIZ_ID);
            if (window.appendThemeParam) nextUrl = window.appendThemeParam(nextUrl);

            window.location.href = nextUrl;
        }

        initGame();
    </script>
</body>

</html>
