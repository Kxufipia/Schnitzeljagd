<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSB Schnitzeljagd 2.0 - Quest 4</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="background-effects">
        <canvas id="campfire"></canvas>
    </div>

    <div id="theme-controls" class="glass-panel"
        style="position: fixed; top: 1rem; right: 1rem; z-index: 50; padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.9rem; display:flex; gap: 0.5rem; color: #ccc;">
        <span id="btn-dark" style="cursor: pointer;">Dark</span> / <span id="btn-light"
            style="cursor: pointer;">Light</span>
    </div>

    <main>
        <div class="container animate-enter" style="margin-left: 17vw; max-width: 60vw; margin-right: auto;">
            <h1 style="margin-bottom: 1.5rem;">Quest 4: Der geheime Ort</h1>

            <div class="glass-panel card">
                <p style="margin-bottom: 1.5rem; text-align: center;">
                    Sucht Kuxu an diesem Ort. Die Bilder offenbaren sich langsam...
                </p>

                <!-- Reveal Gallery -->
                <div class="reveal-gallery">
                    <div class="reveal-item" id="reveal-1">
                        <div class="reveal-img-container">
                            <!-- Placeholder 1 -->
                            <div class="placeholder-box">Bild 1</div>
                        </div>
                        <div class="reveal-timer">Sofort</div>
                    </div>

                    <div class="reveal-item blurry" id="reveal-2">
                        <div class="reveal-img-container">
                            <!-- Placeholder 2 -->
                            <div class="placeholder-box">Bild 2</div>
                        </div>
                        <div class="reveal-timer" id="timer-2">00:30</div>
                    </div>

                    <div class="reveal-item blurry" id="reveal-3">
                        <div class="reveal-img-container">
                            <!-- Placeholder 3 -->
                            <div class="placeholder-box">Bild 3</div>
                        </div>
                        <div class="reveal-timer" id="timer-3">01:00</div>
                    </div>
                </div>

                <!-- Input Section (Same as Quiz 3 was) -->
                <div class="input-group"
                    style="margin-top: 2.5rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem;">
                    <label for="code-input" style="display: block; margin-bottom: 0.5rem; color: var(--wow-gold);">Was
                        ist das Codewort?</label>
                    <input type="text" id="code-input" class="glass-input" placeholder="Algari-..." autocomplete="off">
                </div>

                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                    <button id="confirm-btn" class="btn-primary" style="flex: 2;" onclick="checkAnswer()">
                        <span>Überprüfen</span>
                    </button>
                </div>
                <!-- Error msg -->
                <p id="error-msg"
                    style="color: var(--horde-red); font-size: 0.9rem; min-height: 1.5rem; text-align: center; margin-top: 1rem;">
                </p>

            </div>
        </div>
    </main>

    <!-- Background Character (Optional, reusing Jaina or Paladin or none) -->
    <!-- Background Character: Jaina -->
    <img src="images/Jaina.png" class="quest-portrait animate-enter" alt="Jaina">

    <!-- Static HUD Skeleton -->
    <div id="game-hud" class="glass-panel"
        style="z-index: 9999; view-transition-name: persistent-hud; transition: none;">
        <div class="hud-row header">
            <span class="hud-label">Held</span>
            <span class="hud-value name">...</span>
        </div>
        <div class="hud-divider"></div>
        <div style="margin-top: 1rem; display: flex; justify-content: space-between; align-items: baseline;">
            <span class="hud-accent" style="font-size: 0.9rem; font-weight: bold; text-transform: uppercase;">Stufe
                ...</span>
            <span class="hud-subtext" style="font-size: 0.75rem;">...%</span>
        </div>
        <div class="xp-container" style="margin-top: 0.25rem; margin-bottom: 0.25rem;">
            <div class="xp-bar">
                <div class="xp-fill" style="width: 0%"></div>
                <div class="xp-text">...</div>
            </div>
        </div>
        <div style="text-align: right; margin-bottom: 1rem;">
            <span class="hud-muted" style="font-size: 0.8rem;">Total: ...</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-stats-grid">
            <div class="stat-item completed"><span class="stat-label">Erledigt</span><span class="stat-val">...</span>
            </div>
            <div class="stat-item skipped"><span class="stat-label">Skipped</span><span class="stat-val">...</span>
            </div>
            <div class="stat-item open"><span class="stat-label">Offen</span><span class="stat-val">...</span></div>
        </div>
    </div>

    <!-- Styles -->
    <style>
        .reveal-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .reveal-item {
            position: relative;
            border: 2px solid var(--wow-border);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16/9;
            transition: filter 0.5s ease;
        }

        /* Initial blurred state for hidden images (using filter for visual effect or just opaque overlay) */
        .reveal-item.blurry .reveal-img-container {
            filter: blur(20px) grayscale(100%);
            opacity: 0.3;
        }

        /* Container for img or placeholder */
        .reveal-img-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .placeholder-box {
            color: #555;
            font-weight: bold;
            font-size: 1.2rem;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        /* Loading Overlay/Timer for locked items */
        .reveal-timer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--wow-gold);
            text-shadow: 0 2px 4px black;
            z-index: 10;
        }

        .reveal-item:not(.blurry) .reveal-timer {
            display: none;
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.75rem;
            border-radius: 4px;
            width: 80%;
            max-width: 300px;
            font-size: 1rem;
            text-align: center;
        }

        .glass-input:focus {
            outline: none;
            border-color: var(--wow-gold);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
    </style>

    <script src="campfire.js"></script>
    <script src="stars.js"></script>
    <script src="settings.js"></script>
    <script src="gamestate.js"></script>
    <script src="sidebar.js"></script>
    <script src="sounds.js"></script>
    <script src="toast.js"></script>
    <script src="gamehud.js"></script>
    <script src="script.js"></script>
    <script>
        const QUIZ_ID = 'quiz4';
        const SECRET_CODE = 'Algari-Angler2024';
        let startTime = Date.now();
        let currentState = null;

        // Init State Check
        try {
            currentState = GameState.decode();
            if (!currentState) throw new Error("No state");
        } catch (e) {
            console.error(e);
            alert("Fehler: Spielstand nicht gefunden. Zurück zum Start.");
            window.location.href = window.appendThemeParam('index.html');
        }

        // Image Reveal Logic
        function startRevealTimers() {
            // Image 2: 30s
            startTimer(30, document.getElementById('timer-2'), () => {
                const el = document.getElementById('reveal-2');
                el.classList.remove('blurry');
                if (window.SoundManager) SoundManager.playClick(); // Sound effect
            });

            // Image 3: 60s
            startTimer(60, document.getElementById('timer-3'), () => {
                const el = document.getElementById('reveal-3');
                el.classList.remove('blurry');
                if (window.SoundManager) SoundManager.playClick();
            });
        }

        function startTimer(duration, display, callback) {
            let timer = duration;
            const interval = setInterval(function () {
                let minutes = parseInt(timer / 60, 10);
                let seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    clearInterval(interval);
                    callback();
                }
            }, 1000);
        }

        // Start immediately
        startRevealTimers();

        function checkAnswer() {
            const input = document.getElementById('code-input');
            const userCode = input.value.trim();
            const errorMsg = document.getElementById('error-msg');

            if (!userCode) {
                errorMsg.textContent = "Bitte gib das Codewort ein.";
                return;
            }

            if (userCode.toLowerCase() === SECRET_CODE.toLowerCase()) {
                const timeTaken = (Date.now() - startTime) / 1000;
                // Update State
                const nextStateEncoded = GameState.update(currentState, QUIZ_ID, timeTaken);
                // Get Next URL
                let nextUrl = GameState.getNextQuizUrl(currentState, QUIZ_ID);
                if (window.appendThemeParam) nextUrl = window.appendThemeParam(nextUrl);

                if (window.SoundManager) SoundManager.playLevelUp();

                errorMsg.style.color = 'var(--wow-gold)';
                errorMsg.textContent = "Korrekt! Weiter geht's...";
                setTimeout(() => {
                    window.location.href = nextUrl;
                }, 1000);
            } else {
                errorMsg.style.color = 'var(--horde-red)';
                errorMsg.textContent = "Das ist nicht das richtige Wort.";
                input.value = '';
                input.focus();
                if (window.SoundManager) SoundManager.playError();
            }
        }

        document.getElementById('code-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>

</html>
